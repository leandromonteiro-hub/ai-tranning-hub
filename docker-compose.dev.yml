# Development override: live-reload + mounted source.
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
services:
  api:
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./backend:/app
    environment:
      ENVIRONMENT: development

  worker:
    command: celery -A app.jobs.celery_app.celery worker --loglevel=DEBUG
    volumes:
      - ./backend:/app

  frontend:
    volumes:
      - ./frontend:/app
